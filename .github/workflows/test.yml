name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --prefer-offline --no-audit
      - run: npm run test:unit
      # E2E (Playwright) is intentionally NOT run in CI: the suite is large,
      # includes many local-only debug specs, and writes to a real Supabase
      # project. Run it locally with `npm run test:e2e` against a dev database.
