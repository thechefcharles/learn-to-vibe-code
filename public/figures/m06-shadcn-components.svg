<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#0f172a"/>

  <!-- Title -->
  <text x="600" y="35" font-size="28" font-weight="bold" fill="#e2e8f0" text-anchor="middle">
    shadcn/ui Components in Learn to Vibe Code
  </text>

  <!-- Column 1: Buttons -->
  <text x="100" y="80" font-size="14" font-weight="bold" fill="#06b6d4">Buttons</text>

  <!-- Button: Primary -->
  <rect x="50" y="100" width="100" height="40" fill="#0ea5e9" rx="6"/>
  <text x="100" y="127" font-size="14" fill="#0f172a" font-weight="600" text-anchor="middle">Primary</text>

  <!-- Button: Secondary -->
  <rect x="50" y="160" width="100" height="40" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="6"/>
  <text x="100" y="187" font-size="14" fill="#e2e8f0" font-weight="600" text-anchor="middle">Secondary</text>

  <!-- Button: Destructive -->
  <rect x="50" y="220" width="100" height="40" fill="#ef4444" rx="6"/>
  <text x="100" y="247" font-size="14" fill="#fff" font-weight="600" text-anchor="middle">Delete</text>

  <!-- Button: Outline -->
  <rect x="50" y="280" width="100" height="40" fill="none" stroke="#06b6d4" stroke-width="2" rx="6"/>
  <text x="100" y="307" font-size="14" fill="#06b6d4" font-weight="600" text-anchor="middle">Outline</text>

  <!-- Column 2: Input & Forms -->
  <text x="320" y="80" font-size="14" font-weight="bold" fill="#06b6d4">Forms & Inputs</text>

  <!-- Input field -->
  <rect x="270" y="100" width="150" height="36" fill="#1e293b" stroke="#475569" stroke-width="1" rx="4"/>
  <text x="280" y="123" font-size="13" fill="#94a3b8">placeholder text...</text>

  <!-- Checkbox -->
  <rect x="270" y="160" width="20" height="20" fill="#0ea5e9" stroke="#0ea5e9" stroke-width="2" rx="3"/>
  <text x="300" y="177" font-size="13" fill="#e2e8f0">✓ Checked option</text>

  <!-- Radio -->
  <circle cx="280" cy="210" r="10" fill="none" stroke="#0ea5e9" stroke-width="2"/>
  <circle cx="280" cy="210" r="6" fill="#0ea5e9"/>
  <text x="300" y="217" font-size="13" fill="#e2e8f0">Selected</text>

  <!-- Dropdown/Select -->
  <rect x="270" y="250" width="150" height="36" fill="#1e293b" stroke="#475569" stroke-width="1" rx="4"/>
  <text x="280" y="273" font-size="13" fill="#94a3b8">Select option...</text>
  <text x="410" y="273" font-size="14" fill="#64748b">▼</text>

  <!-- Column 3: Cards & Containers -->
  <text x="570" y="80" font-size="14" font-weight="bold" fill="#06b6d4">Cards & Containers</text>

  <!-- Card -->
  <rect x="520" y="100" width="180" height="120" fill="#1e293b" stroke="#334155" stroke-width="1" rx="8"/>
  <text x="530" y="125" font-size="12" font-weight="600" fill="#e2e8f0">Card Title</text>
  <text x="530" y="145" font-size="11" fill="#cbd5e1">Card content goes here</text>
  <text x="530" y="165" font-size="11" fill="#cbd5e1">with supporting text</text>
  <rect x="520" y="195" width="180" height="25" fill="#0ea5e9" rx="4"/>
  <text x="610" y="213" font-size="11" fill="#fff" font-weight="500" text-anchor="middle">Card Action</text>

  <!-- Alert Box -->
  <rect x="520" y="240" width="180" height="80" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" rx="6"/>
  <text x="530" y="260" font-size="11" font-weight="600" fill="#991b1b">⚠ Warning</text>
  <text x="530" y="280" font-size="10" fill="#7f1d1d">This is an alert message</text>
  <text x="530" y="295" font-size="10" fill="#7f1d1d">with important information</text>

  <!-- Column 4: Progress & Status -->
  <text x="820" y="80" font-size="14" font-weight="bold" fill="#06b6d4">Progress & Status</text>

  <!-- Progress Bar -->
  <text x="770" y="110" font-size="11" fill="#94a3b8">Progress</text>
  <rect x="770" y="120" width="150" height="8" fill="#334155" rx="4"/>
  <rect x="770" y="120" width="105" height="8" fill="#0ea5e9" rx="4"/>
  <text x="930" y="128" font-size="10" fill="#94a3b8">70%</text>

  <!-- Badge -->
  <rect x="770" y="150" width="60" height="24" fill="#0ea5e9" rx="12"/>
  <text x="800" y="167" font-size="11" fill="#fff" font-weight="500" text-anchor="middle">Badge</text>

  <!-- Status indicators -->
  <circle cx="790" cy="200" r="6" fill="#10b981"/>
  <text x="810" y="206" font-size="11" fill="#cbd5e1">Active</text>

  <circle cx="790" cy="230" r="6" fill="#f59e0b"/>
  <text x="810" y="236" font-size="11" fill="#cbd5e1">Pending</text>

  <circle cx="790" cy="260" r="6" fill="#ef4444"/>
  <text x="810" y="266" font-size="11" fill="#cbd5e1">Inactive</text>

  <!-- Bottom: Typography -->
  <text x="100" y="380" font-size="14" font-weight="bold" fill="#06b6d4">Typography</text>

  <text x="100" y="420" font-size="24" font-weight="bold" fill="#e2e8f0">Heading (h1)</text>
  <text x="100" y="450" font-size="18" font-weight="600" fill="#cbd5e1">Subheading (h2)</text>
  <text x="100" y="480" font-size="14" fill="#cbd5e1">Body text with regular weight. Lorem ipsum dolor sit amet, consectetur adipiscing elit.</text>
  <text x="100" y="505" font-size="12" fill="#94a3b8">Small text for secondary information</text>

  <!-- Code block example -->
  <rect x="100" y="540" width="400" height="100" fill="#1e293b" stroke="#334155" stroke-width="1" rx="6"/>
  <text x="110" y="560" font-size="11" font-family="monospace" fill="#10b981">const</text>
  <text x="156" y="560" font-size="11" font-family="monospace" fill="#e2e8f0"> button = </text>
  <text x="250" y="560" font-size="11" font-family="monospace" fill="#f59e0b">'shadcn'</text>
  <text x="110" y="580" font-size="11" font-family="monospace" fill="#cbd5e1">// Styled with Tailwind CSS</text>
  <text x="110" y="600" font-size="11" font-family="monospace" fill="#cbd5e1">// Accessible by default</text>
  <text x="110" y="620" font-size="11" font-family="monospace" fill="#cbd5e1">// Copy-paste components</text>

  <!-- Right side: Design System info -->
  <text x="650" y="380" font-size="14" font-weight="bold" fill="#06b6d4">Design System</text>

  <text x="650" y="420" font-size="12" font-weight="600" fill="#e2e8f0">Color Palette</text>
  <circle cx="665" cy="440" r="8" fill="#0ea5e9"/>
  <text x="680" y="445" font-size="11" fill="#cbd5e1">Primary (Cyan)</text>

  <circle cx="665" cy="465" r="8" fill="#a855f7"/>
  <text x="680" y="470" font-size="11" fill="#cbd5e1">Accent (Purple)</text>

  <circle cx="665" cy="490" r="8" fill="#10b981"/>
  <text x="680" y="495" font-size="11" fill="#cbd5e1">Success (Green)</text>

  <circle cx="665" cy="515" r="8" fill="#ef4444"/>
  <text x="680" y="520" font-size="11" fill="#cbd5e1">Danger (Red)</text>

  <!-- Spacing & Sizing -->
  <text x="650" y="560" font-size="12" font-weight="600" fill="#e2e8f0">Spacing Scale</text>
  <text x="650" y="580" font-size="11" fill="#cbd5e1">4px, 8px, 12px, 16px, 24px, 32px, 48px</text>

  <text x="650" y="610" font-size="12" font-weight="600" fill="#e2e8f0">Border Radius</text>
  <text x="650" y="630" font-size="11" fill="#cbd5e1">sm: 4px, md: 6px, lg: 8px, xl: 12px</text>

  <!-- Footer note -->
  <text x="600" y="750" font-size="11" fill="#64748b" text-anchor="middle">
    shadcn/ui provides low-level, unstyled, accessible components built on Radix UI and styled with Tailwind CSS
  </text>
  <text x="600" y="770" font-size="11" fill="#64748b" text-anchor="middle">
    Perfect for building consistent, accessible interfaces without starting from scratch
  </text>
</svg>